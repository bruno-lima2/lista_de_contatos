<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="campos_selecao">
      <div class="container_campo_nome">
        <label for="nome">Nome</label>
        <input
          type="text"
          placeholder="Digite seu nome completo"
          class="form-control campo_nome"
        />
      </div>
      <div class="container_campo_email">
        <label for="email">Email</label>
        <input
          type="text"
          placeholder="exemplo@dominio.com"
          class="form-control campo_email"
        />
      </div>
      <div class="container_campo_celular">
        <label for="celular">Celular</label>
        <input
          type="text"
          placeholder="(00) 0 0000-0000"
          class="form-control campo_celular"
        />
      </div>
    </div>
    <button class="btn btn-primary adicionar">ADICIONAR</button>
    <div class="campos"></div>
    <script src="./script.js"></script>
  </body>
</html>
